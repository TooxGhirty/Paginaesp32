<!DOCTYPE html>
<html lang="es">
<head>

<title>ESP32</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;

    background: linear-gradient(135deg, #022c22, #065f46, #10b981);

}

nav{

    color:#00ff9f;
    letter-spacing:2px;
}

.card{
    max-width:900px;
    margin:60px auto;
    padding:40px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    animation: aparecer 1s ease;
}

h1{
    text-align:center;
    font-size:42px;
    color:#00ff9f;
    text-shadow:0 0 10px #00ff9f;
}

table{
    width:60%;
    margin:auto;
    border-collapse:collapse;
}
th{
    background:#00ff9f;
    color:black;
}
td,th{
    border:1px solid white;
    padding:10px;
}

button{
    display:block;
    margin:20px auto;
    padding:10px;
    background:#00ff9f;
    border:none;
    cursor:pointer;
}

.extra{
    margin-top:20px;
    line-height:1.7;
    animation: aparecer 1s ease;
}

</head>

<body>

<nav>

<p>Microcontrolador con Wi-Fi y Bluetooth.</p>

<img src="imagen-esp32.png" style="display:block;margin:auto; width:300px;">

</div>

<script>
function mostrarMas(){
    document.getElementById("extra").innerHTML = `
    <div class="extra">
    <p>El ESP32 es un microcontrolador potente utilizado en proyectos IoT por su conectividad inalámbrica integrada.</p>

    <p>Es clave en automatización, robótica y sistemas inteligentes.</p>

    `;
}
